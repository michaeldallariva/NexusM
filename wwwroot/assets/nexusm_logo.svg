<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171c23"/>
      <stop offset="100%" stop-color="#06080b"/>
    </linearGradient>
    <linearGradient id="grnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42ff96"/>
      <stop offset="100%" stop-color="#00a84e"/>
    </linearGradient>
    <filter id="stShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="txShadow" x="-30%" y="-120%" width="160%" height="340%">
      <feDropShadow dx="0" dy="1" stdDeviation="7" flood-color="#000000" flood-opacity="0.92"/>
    </filter>
  </defs>

  <!-- Solid base fill: eliminates transparent corners that appear as white dots in favicon rendering -->
  <rect width="512" height="512" fill="#0b0e13"/>
  <!-- Gradient overlay with rounded corners (visual polish for sidebar / large display) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle inner-edge highlight ring -->
  <rect x="14" y="14" width="484" height="484" rx="86"
        fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <!--
    3D isometric layer stack — true geometric center at (256, 256).

    Actual path bounding box: x 0–310, y 0–348  (base layer bottom reaches y=348).
    Geometric centre of paths: x=155, y=174.
    translate(101, 82): 256−155=101 horizontally, 256−174=82 vertically  ✓

    Inner border (y=16 … y=498) breathing room:
      top:    82 − 16 = 66 px
      bottom: 498 − (82+348) = 68 px   → equal on both sides  ✓
  -->
  <g transform="translate(101 82)" filter="url(#stShadow)">
    <!-- Layer 1 — top diamond face (bright gradient) -->
    <path d="M155 0 310 72 155 145 0 72Z" fill="url(#grnGrad)"/>
    <!-- Layer 2 — side panels (dark green, depth) -->
    <path d="M0 72v58l155 74 155-74V72l-155 73Z" fill="#087038"/>
    <!-- Layer 3 — top face (medium green) -->
    <path d="M0 150v46l155 74 155-74v-46l-155 73Z" fill="#17c65c"/>
    <!-- Layer 4 — base face (deep green) -->
    <path d="M0 228v46l155 74 155-74v-46l-155 73Z" fill="#0a9548"/>
  </g>

  <!--
    Text backdrop pill — centered at y=256.
    raw-y of text centre: 256−82 = 174 (exact geometric centre of stack)  ✓
  -->
  <rect x="66" y="218" width="380" height="76" rx="18"
        fill="#020a12" fill-opacity="0.86"/>
  <rect x="66" y="218" width="380" height="76" rx="18"
        fill="none" stroke="#30ef7c" stroke-opacity="0.50" stroke-width="2"/>

  <!-- NexusM wordmark, centered at (256, 256) -->
  <text x="256" y="256"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Arial Black', Arial, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="76"
        letter-spacing="-1"
        filter="url(#txShadow)">
    <tspan fill="#eef3ff">Nexus</tspan><tspan fill="#34ff86">M</tspan>
  </text>
</svg>
